<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lilyUI Web Demo</title>
</head>

<body>
    <center>
        <h1>Web Demo of LilyUI</h1>
        <p>As this is a demo, expect literally nothing to work its just to show.<br>Also, you'll need a Game Controller for this.</p>
        <h3>Controls</h3>
        <p>Use the D-pad to move, A to select, B to go back. Standard shit.</p>
    </center>
    <iframe src="lilyui.html" frameborder="0" width="640px" height="480px"></iframe>
    <style>
        @font-face {
            font-family: Fredoka;
            src: url(fredoka.ttf);
        }

        html {
            background: radial-gradient(100.52% 100.52% at 49.69% 100.52%, #1C002A 0%, #610D8C 100%);
            scroll-behavior: smooth !important;
            background-color: black;
        }

        body {
            font-family: Fredoka;
            color: white;
            font-weight: bold;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-repeat: no-repeat !important;
        }

        iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5);
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }
    </style>
</body>

</html>
