<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lilyUI R36s UI</title>
    <style>
        @font-face {
            font-family: "Material Symbols Rounded";
            font-style: normal;
            font-weight: 100 700;
            font-display: block;
            src: url("./material-symbols-rounded.woff2") format("woff2");
        }

        .material-symbols-rounded,
        .toolbar .icon {
            font-family: "Material Symbols Rounded";
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-feature-settings: "liga";
            font-variation-settings:
                'FILL' 1,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }

        @font-face {
            font-family: Fredoka;
            src: url(fredoka.ttf);
        }

        html {
            width: 640px;
            height: 480px;
            scroll-behavior: smooth !important;
            background-color: black;
        }

        /* body::after{
            background-image: url(./screenshots/Screenshot.png);
            position: absolute;
            content: ' ';
            display: block;
            top:0px;
            width: 640px;
            height: 480px;
            left:0px;
            mix-blend-mode:difference;
        } */
        body {
            font-family: Fredoka;
            color: white;
            font-weight: bold;
            margin: 0px;
            padding: 0px;
            width: 640px;
            max-width: 640px;
            height: 480px;
            overflow: hidden;
            background-repeat: no-repeat !important;
            background: radial-gradient(100.52% 100.52% at 49.69% 100.52%, #1C002A 0%, #610D8C 100%);
        }

        .toolbar {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 0px;
            gap: 25px;

            position: absolute;
            width: 640px;
            height: 50px;
            left: 0px;
            top: calc(480px - 50px);
            background: rgba(0, 0, 0, 0.34);
            box-shadow: 0px -4px 4px rgba(0, 0, 0, 0.34);

            & img {
                width: 26px;
                height: 22px;
                object-fit: none;
                /* no scaling */
                object-position: center;
                /* crop from center */
                display: block;

            }

            & .icon {

                font-size: 22pt;
            }

            & span {
                text-shadow: 0px 0px 2.93333px rgba(0, 0, 0, 0.25);
                -webkit-background-clip: text;
                -moz-background-clip: text;
                background-clip: text;
                background-color: white;
                color: transparent;
                display: block;
            }
        }

        .focus:is(.toolbar > *) {
            text-shadow: 0px 0px 2.93333px rgba(4, 0, 255, 0.25);


        }

        .time {
            font-family: 'Fredoka';
            font-size: 24px;

        }



        .selector {
            display: flex;
            flex-direction: row;
            /* justify-content: center; */
            align-items: center;
            padding: 0px;
            gap: 65px;

            position: absolute;
            width: 640px;
            max-width: 640px;
            height: 430px;
            left: 0px;
            top: 0px;
            scroll-snap-type: x mandatory;
            box-sizing: border-box;
            overflow-x: hidden;

            padding-left: calc(50% - 137.5px);
            padding-right: calc(50% - 137.5px);
        }

        *::-webkit-scrollbar {
            width: 0px;
            height: 0px;
        }

        .card {

            scroll-snap-align: center;
            filter: blur(0px);

            display: flex;
            flex: 0 0 auto;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 275px !important;
            width: 275px !important;
            height: 280px !important;
            transition: ease-in-out 0.1s all;
            scale: 1;
            filter: blur(0px);
            opacity: 1;

            & .card-image {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                width: 275px;
                height: 218px;
                border-radius: 15px;

                & img {
                    height: 172px;
                    width: auto;
                    flex: none;
                    order: 0;
                    flex-grow: 0;
                }

            }

            & .card-label {
                font-size: 22px;
                align-items: center;
                text-align: center;
                -webkit-background-clip: text;
                background-clip: text;
                background-image: linear-gradient(rgb(100, 100, 100), #fff 25%);
                color: transparent;
            }

            &.card:not(.focus) {
                scale: 0.8;
                filter: blur(5px);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>

    <div class="selector">
        <div class="card ">
            <div class="card-image" style="background: linear-gradient(122.62deg, #433F8D 0%, #A01D5A 100%);"><img
                    src="platform_icons/gb.png" alt=""></div>
            <span class="card-label">Game Boy / GBC / GBA<br>103 Games</span>
        </div>
        <div class="card focus">
            <div class="card-image" style="background: linear-gradient(122.62deg, #F5BE04 0%, #E12323 100%);"><img
                    src="platform_icons/linux.png" alt=""></div>
            <span class="card-label">Linux Native<br>103 Softwares</span>
        </div>
        <div class="card ">
            <div class="card-image"
                style="background: linear-gradient(122.62deg, #DF0024 0%, #3C5DA5 25%, #00AC9f 50%, #F3C300 100%);"><img
                    src="platform_icons/ps1.png" alt=""></div>
            <span class="card-label">Playstation 1<br>103 Games</span>
        </div>

    </div>
    <div class="toolbar">
        <span class="icon">music_note</span>
        <span class="icon">download</span>
        <span class="icon">settings</span>
        <span class="icon">power_settings_new</span>
        <span class="time">00:00</span>
        <span class="icon">notifications</span>
        <span class="icon">bluetooth</span>
        <span class="icon">wifi</span>
        <span class="icon">battery_android_full</span>
    </div>
    <script src="script.js"></script>
</body>

</html>
